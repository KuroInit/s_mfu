# LongBench v2: real long-context documents, truncated to fit bs=128.
# DeepSeek-V2-Lite: 163K context, MLA KV=31KB/tok → 13K fits at bs=128.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: deepseek-ai/DeepSeek-V2-Lite-Chat
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 13312
target_output_tokens: 1
