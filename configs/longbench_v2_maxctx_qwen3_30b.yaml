# LongBench v2: 75% max context window test.
# Qwen3-30B: 40K max context, 75% = 30K. KV=48KB/tok, 60GB weights.
# At 30K tokens: bs=1 → ~63GB, bs=16 → ~85GB. Max safe bs=16.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: Qwen/Qwen3-30B-A3B
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 30720
target_output_tokens: 1
max_batch_size: 16
