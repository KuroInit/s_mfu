# LongBench v2: 75% max context window test.
# Qwen1.5-MoE: 32K max context, 75% = 24K. KV=12KB/tok, 28.6GB weights.
# All batch sizes [1,32,64,128] fit within 94GB single GPU.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: Qwen/Qwen1.5-MoE-A2.7B-Chat
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 24576
target_output_tokens: 1
max_batch_size: 128
