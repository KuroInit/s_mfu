# LongBench v2: real long-context documents, truncated to fit bs=128.
# Qwen3-Next-80B: 262K context, KV=6KB/tok/GPU (TP=2) → 8K fits at bs=128.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: Qwen/Qwen3-Next-80B-A3B-Instruct
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 8192
target_output_tokens: 1
