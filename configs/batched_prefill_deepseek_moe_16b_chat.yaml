# Batched prefill for the original DeepSeekMoE 16B chat model.
# Keep input length at 2K within the 4K context window; cap batch to 128
# until startup/runtime memory is verified on the target H100 NVL host.
dataset_names: ["longbench_v2"]
metrics: []
model_id: deepseek-ai/deepseek-moe-16b-chat
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 2048
target_output_tokens: 1
chunked_prefill_size: 32768
max_batch_size: 128
prefill_mode: batched
