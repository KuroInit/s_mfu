# Run 3 sweep configuration (revised 2026-04-15).
# Scope:
#   - DeepSeek-V2-Lite dropped (MLA FLOPS upstream bug masks results, see
#     Audit Findings #15).
#   - Datasets reduced to longbench_v2 + longbench_v2_maxctx only (drop `prefill`
#     which duplicates maxctx, and drop `batched_prefill` per Findings #21/#22
#     where carryover + scheduler under-fill contaminate the metric).
#   - Batch sizes capped at 32 (higher batches fragmented the chunk window).
#   - TP chosen by necessity only: tp=1 unless the model won't fit on one
#     H100 NVL (94 GB). Only qwen3_next_80b needs tp=2. Previous tp=1 vs tp=2
#     comparison dropped — overhead was ~1–4 pp on qwen1_5_moe (see Experiment
#     Results "TP=1 vs TP=2" Run 3 partial), not a research axis for Run 3.
batch_sizes: [1, 2, 4, 8, 16, 32]
datasets: [longbench_v2, longbench_v2_maxctx]
port: 30000

models:
  - id: Qwen/Qwen1.5-MoE-A2.7B-Chat
    tp: 1
    slug: qwen1_5_moe

  - id: Qwen/Qwen3-30B-A3B
    tp: 1
    slug: qwen3_30b

  - id: Qwen/Qwen3-Next-80B-A3B-Instruct
    tp: 2
    slug: qwen3_next_80b
