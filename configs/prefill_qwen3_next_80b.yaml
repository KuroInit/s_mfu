# Prefill-heavy benchmark: 32K input tokens, 1 output token
# Stresses prefill throughput / KV-cache fill with minimal decoding work.
# Uses LongBench v2 real documents as base text for realistic attention patterns.
dataset_names: ["longbench_v2"]
metrics: []
model_id: Qwen/Qwen3-Next-80B-A3B-Instruct
dataset_split: train

fixed_length_mode: true
target_input_tokens: 32768
target_output_tokens: 1
num_samples: 100
# Conservative 2x94GB H100 NVL estimate: ~74.3GB weights/GPU + ~1.5GB KV/request/GPU.
max_batch_size: 8
