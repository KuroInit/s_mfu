# Fixed-length prefill benchmark: 32K input tokens, 1 output token.
dataset_names: ["longbench_v2"]
metrics: []
model_id: Qwen/Qwen3-30B-A3B
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 32768
