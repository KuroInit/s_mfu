# Batched-prefill MoE-CAP metric sweep.
#
# Use the batched_prefill_* configs instead of longbench_v2_* so the sweep
# changes the physical prefill batch that SGLang packs into a forward pass.
# The longbench_v2 configs use one huge prompt per request, which tends to
# saturate at low concurrency and hides the expected rise/plateau/collapse.
batch_sizes: [2,4,8,16,32,64,128, 256, 512]
datasets: [batched_prefill]
port: 30000
gpu_memory_gb: 94

models:
  - id: Qwen/Qwen1.5-MoE-A2.7B-Chat
    tp: 1
    slug: qwen1_5_moe
    max_context_tokens: 32768
    weight_gb_per_gpu: 28.6
    kv_bytes_per_token_per_gpu: 12288
