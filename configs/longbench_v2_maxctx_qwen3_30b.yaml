# LongBench v2: max context window test.
# Qwen3-30B: 40K context, 60GB weights, KV=48KB/tok.
# At 40K tokens: bs=1 → ~68GB, bs=8 → ~83GB, bs=16 → ~98GB (OOM). Max safe bs=8.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: Qwen/Qwen3-30B-A3B
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 40960
target_output_tokens: 1
max_batch_size: 8
