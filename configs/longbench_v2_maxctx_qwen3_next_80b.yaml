# LongBench v2: 75% max context window test.
# Qwen3-Next-80B: 262K max context, 75% = 196K. KV=6KB/tok/GPU (TP=2), 80GB/GPU weights.
# At 196K tokens: bs=1 → ~82GB/GPU, bs=4 → ~87GB/GPU. Max safe bs=4.
dataset_names: ["longbench_v2"]
metrics: ["em"]
model_id: Qwen/Qwen3-Next-80B-A3B-Instruct
precision: bfloat16
dataset_split: train
num_samples: 200

fixed_length_mode: true
target_input_tokens: 196608
target_output_tokens: 1
max_batch_size: 4
